name: othello-engine

services:
  engine:
    build:
      context: .
      target: runtime
    image: othello-engine:local
    environment:
      OTHELLO_PROFILE: ${OTHELLO_PROFILE:-0}
      OTHELLO_PROFILE_DIR: /engine/profiles
    volumes:
      - profiles:/engine/profiles
    command: ["15", "2000"]

  benchmark:
    profiles: ["benchmark"]
    build:
      context: .
      target: benchmark
    image: othello-engine-benchmark:local
    environment:
      OTHELLO_PROFILE: ${OTHELLO_PROFILE:-0}
      OTHELLO_PROFILE_DIR: /engine/profiles
    volumes:
      - profiles:/engine/profiles

  test:
    profiles: ["test"]
    build:
      context: .
      target: test
    image: othello-engine-test:local

volumes:
  profiles:
